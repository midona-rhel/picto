name: Legacy Gate (Non-Blocking)

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: legacy-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  legacy-gate:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        run: npm install

      - name: Run legacy gate (non-blocking)
        id: legacy
        run: |
          set +e
          npm run gate:legacy 2>&1 | tee legacy-gate.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -ne 0 ]; then
            echo "::warning::Legacy gate failed with exit code $code (non-blocking)."
          fi
          exit 0

      - name: Upload legacy gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-gate-log
          path: legacy-gate.log
          if-no-files-found: warn

      - name: Write summary
        if: always()
        run: |
          echo "## Legacy Gate Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Exit code: \`${{ steps.legacy.outputs.exit_code }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: non-blocking informational lane" >> "$GITHUB_STEP_SUMMARY"
